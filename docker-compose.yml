version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:5000/api
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=5000
    volumes:
      - ./reports:/app/reports

  ml-service:
    build:
      context: ./ml-model
      dockerfile: Dockerfile.ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-model:/app
